[tool.poetry]
name = "ddd+fastapi+kafka+websockets"
version = "0.1.0"
description = ""
authors = ["mialkin <mialkin@bolid.ru>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.135.1"
motor = "^3.7.1"
uvicorn = {extras = ["all"], version = "^0.41.0"}
